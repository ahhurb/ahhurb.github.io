<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>徽乡药萃</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary-green: #4CAF50; --nav-height: 75px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", "STHeiti", sans-serif; }
        body { background: #000; color: #fff; overflow-x: hidden; }

        /* 顶部导航栏 - 永久置顶 */
        header {
            position: fixed;
            top: 0; left: 0; width: 100%; height: var(--nav-height);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 50px; background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px); z-index: 9999;
            box-shadow: 0 2px 15px rgba(0,0,0,0.15);
        }
        .logo-area { display: flex; align-items: center; gap: 12px; color: #2e7d32; }
        .logo-img { height: 45px; width: auto; object-fit: contain; } /* 适配Logo尺寸 */
        .brand-name { font-size: 22px; font-weight: bold; letter-spacing: 1px; }

        nav ul { display: flex; list-style: none; gap: 30px; }
        nav ul li a { text-decoration: none; color: #333; font-size: 15px; font-weight: bold; transition: 0.3s; }
        nav ul li a:hover { color: var(--primary-green); }

        /* 轮播容器 */
        #carousel-container { height: 100vh; width: 100%; position: relative; overflow: hidden; }
        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; transition: opacity 1.2s ease-in-out;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1;
        }
        .slide.active { opacity: 1; z-index: 2; }
        .slide-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }
        .slide-content { position: relative; z-index: 10; text-align: center; }
        .slide-content h1 { font-size: 5rem; letter-spacing: 12px; margin-bottom: 25px; text-shadow: 0 5px 20px rgba(0,0,0,0.6); }
        
        .enter-btn {
            padding: 12px 50px; border: 2px solid white; background: rgba(255,255,255,0.1);
            color: white; font-size: 1.6rem; cursor: pointer; transition: 0.3s;
        }
        .enter-btn:hover { background: white; color: #2e7d32; font-weight: bold; }

        /* 手动控制按钮 */
        .ctrl-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.1); border: none; color: white;
            font-size: 40px; padding: 25px 15px; cursor: pointer; z-index: 100;
            transition: 0.3s;
        }
        .ctrl-btn:hover { background: rgba(255,255,255,0.3); }
        .btn-prev { left: 0; border-radius: 0 8px 8px 0; }
        .btn-next { right: 0; border-radius: 8px 0 0 8px; }

        /* 详情内容页 */
        #detail-view {
            display: none; position: fixed; top: var(--nav-height); left: 0;
            width: 100%; height: calc(100vh - var(--nav-height));
            background: #fff; color: #333; z-index: 10000; overflow-y: auto;
        }
        .content-card { max-width: 1000px; margin: 40px auto; padding: 0 25px; }
        #detail-img-small { width: 100%; max-height: 500px; object-fit: cover; border-radius: 12px; margin-bottom: 35px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .close-btn { cursor: pointer; color: var(--primary-green); margin-bottom: 25px; display: inline-block; font-weight: bold; font-size: 1.1rem; border: 1px solid var(--primary-green); padding: 5px 15px; border-radius: 20px; transition: 0.3s; }
        .close-btn:hover { background: var(--primary-green); color: white; }
        .markdown-body { line-height: 1.8; font-size: 1.2rem; color: #333; }

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 99999; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="https://raw.githubusercontent.com/ahhurb/ahhurb-data/main/logo.jpg" alt="Logo" class="logo-img" onerror="this.style.display='none'">
            <span class="brand-name">徽乡药萃</span>
        </div>
        <nav>
            <ul>
                <li><a href="#" onclick="location.reload()">首页</a></li>
                <li><a href="#">知识学习</a></li>
                <li><a href="#">品质鉴定</a></li>
                <li><a href="#">培训护航</a></li>
                <li><a href="#">我的资源</a></li>
            </ul>
        </nav>
    </header>

    <div id="carousel-container">
        <div class="loading-overlay" id="loader">资源同步中...</div>
        <button class="ctrl-btn btn-prev" onclick="manualChange(-1)">&#10094;</button>
        <button class="ctrl-btn btn-next" onclick="manualChange(1)">&#10095;</button>
    </div>

    <div id="detail-view">
        <div class="content-card">
            <div class="close-btn" onclick="closeDetail()">← 返回主页</div>
            <img id="detail-img-small" src="">
            <div id="md-content" class="markdown-body"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://api.github.com/repos/ahhurb/ahhurb-data/contents/home";
        const RAW_URL = "https://raw.githubusercontent.com/ahhurb/ahhurb-data/main/home";
        let homeData = [];
        let currentIndex = 0;
        let slideInterval;
        const SLIDE_DURATION = 5000; 

        async function init() {
            try {
                const res = await fetch(API_URL);
                const items = await res.json();
                const folders = items.filter(i => i.type === 'dir');
                for (let f of folders) {
                    homeData.push({
                        name: f.name,
                        img: `${RAW_URL}/${f.name}/${f.name}.jpg`,
                        md: `${RAW_URL}/${f.name}/${f.name}.md`
                    });
                }
                renderCarousel();
                resetTimer();
                document.getElementById('loader').style.display = 'none';
            } catch (e) {
                console.error("加载失败", e);
            }
        }

        function renderCarousel() {
            const container = document.getElementById('carousel-container');
            homeData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `slide ${index === 0 ? 'active' : ''}`;
                div.innerHTML = `
                    <img src="${item.img}" class="slide-bg" onerror="this.src='https://via.placeholder.com/1920?text=图片加载中...'">
                    <div class="slide-content">
                        <h1>${item.name}</h1>
                        <button class="enter-btn" onclick="openDetail(${index})">进入</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function changeSlide(direction) {
            const slides = document.querySelectorAll('.slide');
            if (slides.length < 2) return;
            slides[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + direction + slides.length) % slides.length;
            slides[currentIndex].classList.add('active');
        }

        function manualChange(direction) {
            changeSlide(direction);
            resetTimer();
        }

        function resetTimer() {
            if (slideInterval) clearInterval(slideInterval);
            slideInterval = setInterval(() => changeSlide(1), SLIDE_DURATION);
        }

        async function openDetail(index) {
            clearInterval(slideInterval);
            const item = homeData[index];
            const detailView = document.getElementById('detail-view');
            const mdBox = document.getElementById('md-content');
            
            detailView.style.display = 'block';
            document.getElementById('detail-img-small').src = item.img;
            mdBox.innerHTML = "正在加载文档内容...";

            try {
                const res = await fetch(item.md);
                const text = await res.text();
                mdBox.innerHTML = marked.parse(text);
                detailView.scrollTo(0, 0);
            } catch (e) {
                mdBox.innerHTML = "文档加载失败。";
            }
        }

        function closeDetail() {
            document.getElementById('detail-view').style.display = 'none';
            resetTimer();
        }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('detail-view').style.display !== 'block') {
                if (e.key === "ArrowLeft") manualChange(-1);
                if (e.key === "ArrowRight") manualChange(1);
            }
        });

        init();
    </script>
</body>
</html>
